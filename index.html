<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lionel Messi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a1f3b;
            margin: 0;
            padding: 15px;
        }
        
        .card {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px black;
        }

        /* BILD OBEN */
        .header-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        /* ZWEITES BILD */
        .messi-extra {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
        }
        
        h1 {
            text-align: center;
            color: #0a1f3b;
            font-size: 48px;
            margin: 0 0 5px 0;
            background: #ffd700;
            padding: 15px;
            border-radius: 15px;
        }
        
        .box {
            background: #f8f8f8;
            margin: 20px 0;
            padding: 20px;
            border-radius: 15px;
            border-left: 8px solid #0a1f3b;
        }
        
        h2 {
            color: #0a1f3b;
            margin: 0 0 15px 0;
            font-size: 28px;
            border-bottom: 3px solid #ffd700;
            padding-bottom: 5px;
        }
        
        p {
            font-size: 16px;
            line-height: 1.5;
            margin: 10px 0;
        }
        
        .fett {
            font-weight: bold;
            color: #0a1f3b;
            font-size: 18px;
        }
        
        .tore-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .tore-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #ffd700;
        }
        
        .zahl {
            font-size: 40px;
            font-weight: bold;
            color: #0a1f3b;
        }
        
        .emoji {
            font-size: 30px;
        }
        
        @media (max-width: 600px) {
            .tore-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- BILD 1 -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Lionel_Messi_20180626.jpg"
             class="header-img"
             alt="Lionel Messi">

        <h1>🇦🇷 LIONEL MESSI 🇦🇷</h1>

        <!-- HERKUNFT -->
        <div class="box">
            <h2>🌎 Wo kommt Messi her?</h2>
            <p><span class="emoji">🇦🇷</span> <span class="fett">Land:</span> Argentinien</p>
            <p><span class="emoji">🏙️</span> <span class="fett">Geburtsstadt:</span> Rosario</p>
        </div>

        <!-- AKTUELL -->
        <div class="box">
            <h2>📍 Was macht Messi gerade?</h2>
            <p><span class="emoji">🇺🇸</span> <span class="fett">Aktueller Verein:</span> Inter Miami</p>

            <!-- BILD 2 -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Leo_Messi_2022.jpg"
                 class="messi-extra"
                 alt="Messi 2022">
        </div>

        <!-- TORE -->
        <div class="box">
            <h2>⚽ Wie viele Tore hat Messi geschossen?</h2>

            <div class="tore-grid">
                <div class="tore-item">
                    <div class="zahl">672</div>
                    <div>FC Barcelona</div>
                </div>

                <div class="tore-item">
                    <div class="zahl">109</div>
                    <div>Argentinien</div>
                </div>
            </div>

            <p style="text-align:center; font-size:24px; font-weight:bold;">
                🎯 GESAMT: 847 TORE!
            </p>
        </div>

    </div>

</body>
</html>
