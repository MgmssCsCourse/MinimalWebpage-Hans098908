<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">  
    <title>Lionel Messi</title>
    <style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <head>  
        <body>
    <div class="card">

        <!-- ✅ BILD GANZ OBEN -->
        <img src="" 
             class="header-img">

        <h1>🇦🇷 LIONEL MESSI 🇦🇷</h1>
        
        
        <!-- HERKUNFT -->
        <div id="herkunft" class="box">
            <h2>🌎 Wo kommt Messi her?</h2>
            <p><span class="emoji">🇦🇷</span> <span class="fett">Land:</span> Argentinien (Südamerika)</p>
            <p><span class="emoji">🏙️</span> <span class="fett">Geburtsstadt:</span> Rosario (24. Juni 1987)</p>
            <p><span class="emoji">⚽</span> <span class="fett">Jugendverein:</span> Newell's Old Boys (da hat er als Kind gespielt)</p>
            <p><span class="emoji">✈️</span> <span class="fett">Mit 13 nach Spanien:</span> Weil er krank war (Wachstumshormon-Mangel) und Barça die Behandlung bezahlt hat.</p>
            <p><span class="emoji">🇮🇹</span> <span class="fett">Fun Fact:</span> Seine Urgroßeltern kamen aus Italien, deshalb hat er auch einen italienischen Pass.</p>
        </div>
        
        <!-- AKTUELLER VEREIN & WERT & WOHNORT -->
        <div id="aktuell" class="box">
            <h2>📍 Was macht Messi gerade?</h2>
            <p><span class="emoji">🇺🇸</span> <span class="fett">Aktueller Verein:</span> Inter Miami (USA) - seit 2023</p>
            <p><span class="emoji">💰</span> <span class="fett">Marktwert:</span> 25 Millionen Euro (mit 36 Jahren immer noch viel!)</p>
            <p><span class="emoji">🏠</span> <span class="fett">Wohnort:</span> Miami, Florida (USA)</p>
            <p><span class="emoji">📅</span> <span class="fett">Vertrag:</span> bis 2025 bei Inter Miami</p>
        </div>
        
        <!-- FAMILIE -->
        <div id="familie" class="box">
            <h2>👪 Familie</h2>
            <p><span class="emoji">💍</span> <span class="fett">Ehefrau:</span> Antonela Roccuzzo</p>
            <p><span class="emoji">👦👦👦</span> <span class="fett">Kinder:</span> Thiago, Mateo, Ciro</p>
            <p><span class="emoji">👨👩</span> <span class="fett">Eltern:</span> Jorge und Celia</p>
        </div>
        
        <!-- TORE -->
        <div id="tore" class="box">
            <h2>⚽ Wie viele Tore hat Messi geschossen?</h2>
            <div class="tore-grid">
                <div class="tore-item">
                    <span class="emoji">🇪🇸</span>
                    <div class="zahl">672</div>
                    <div>FC Barcelona</div>
                </div>
                <div class="tore-item">
                    <span class="emoji">🇫🇷</span>
                    <div class="zahl">32</div>
                    <div>Paris SG</div>
                </div>
                <div class="tore-item">
                    <span class="emoji">🇺🇸</span>
                    <div class="zahl">34</div>
                    <div>Inter Miami</div>
                </div>
                <div class="tore-item">
                    <span class="emoji">🇦🇷</span>
                    <div class="zahl">109</div>
                    <div>Argentinien</div>
                </div>
            </div>
            <p style="text-align: center; font-size: 24px; font-weight: bold; background: #ffd700; padding: 10px; border-radius: 50px; margin-top: 15px;">
                🎯 GESAMT: 847 TORE!
            </p>
        </div>
        
        <!-- FUSS -->
        <div id="fuss" class="box">
            <h2>👟 Welcher Fuß?</h2>
            <p style="font-size: 50px; text-align: center;">👈</p>
            <p style="text-align: center; font-size: 22px; font-weight: bold;">LINKSFUSS!</p>
        </div>
        
        <!-- ERFOLGE -->
        <div id="erfolge" class="box">
            <h2>🏆 Wichtigste Erfolge</h2>
            <p>7x Ballon d'Or</p>
            <p>Weltmeister 2022</p>
            <p>4x Champions League</p>
        </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
